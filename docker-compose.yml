services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: safety_zone
      POSTGRES_USER: safety_zone
      POSTGRES_PASSWORD: safety_zone
    ports:
      - "5432:5432"
    volumes:
      - safety_zone_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safety_zone -d safety_zone"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  safety_zone_pgdata:

