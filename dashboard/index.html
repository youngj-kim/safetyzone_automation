<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>보호구역 모니터링 대시보드</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQx/UXR2v9n2mcp0LyfY5vT1P3wZP6Y="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css?v=20260723-9" />
  </head>
  <body>
    <main class="app-shell">
      <section class="side-panel" aria-label="변경 감지 요약">
        <header class="panel-header">
          <p class="eyebrow">Safety Zone Monitor</p>
          <h1>보호구역 변경 현황</h1>
          <p id="last-updated" class="muted">데이터를 불러오는 중</p>
        </header>

        <section class="metrics" aria-label="현재 등록 현황">
          <article class="metric">
            <span class="metric-label">Polygon</span>
            <strong id="polygon-count">0</strong>
          </article>
          <article class="metric">
            <span class="metric-label">Point</span>
            <strong id="point-count">0</strong>
          </article>
          <article class="metric">
            <span class="metric-label">시군구</span>
            <strong id="sgg-count">0</strong>
          </article>
        </section>

        <section class="toolbar" aria-label="레이어 선택">
          <label><input type="checkbox" data-layer="current" checked /> 현재</label>
          <label><input type="checkbox" data-layer="new" checked /> 신규</label>
          <label><input type="checkbox" data-layer="changed" checked /> 변경</label>
          <label><input type="checkbox" data-layer="review" checked /> 삭제(검토)</label>
        </section>

        <section class="activity-shell" aria-label="운영 이력">
          <div class="activity-tabs" role="tablist" aria-label="이력 보기 선택">
            <button
              id="events-tab"
              class="activity-tab active"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="events-panel"
              data-panel="events"
            >
              최근 변경
              <span id="event-total">0건</span>
            </button>
            <button
              id="runs-tab"
              class="activity-tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="runs-panel"
              data-panel="runs"
            >
              모니터링 이력
              <span id="run-total">0건</span>
            </button>
          </div>

          <section
            id="events-panel"
            class="activity-panel active"
            role="tabpanel"
            aria-labelledby="events-tab"
          >
            <div class="filters" aria-label="변경 이력 필터">
              <input
                id="event-search"
                type="search"
                placeholder="시설명, 관리번호, 시군구 검색"
              />
              <select id="event-type">
                <option value="">전체 변경 유형</option>
                <option value="NEW">신규</option>
                <option value="ATTRIBUTE_CHANGED">속성변경</option>
                <option value="GEOMETRY_CHANGED">도형변경</option>
                <option value="GEOMETRY_ATTRIBUTE_CHANGED">도형+속성변경</option>
                <option value="POINT_CHANGED">위치변경</option>
                <option value="POINT_ATTRIBUTE_CHANGED">위치+속성변경</option>
                <option value="DELETED">삭제</option>
                <option value="MISSING">누락 검토</option>
              </select>
            </div>
            <ol id="event-list" class="event-list"></ol>
          </section>

          <section
            id="runs-panel"
            class="activity-panel"
            role="tabpanel"
            aria-labelledby="runs-tab"
            hidden
          >
            <ol id="run-list" class="run-list"></ol>
          </section>
        </section>
      </section>

      <section class="map-panel" aria-label="보호구역 지도">
        <div id="map"></div>
        <div class="legend" aria-label="지도 범례">
          <span><i class="swatch zone-child"></i>어린이</span>
          <span><i class="swatch zone-senior"></i>노인</span>
          <span><i class="swatch zone-disabled"></i>장애인</span>
          <span><i class="swatch change-new"></i>신규</span>
          <span><i class="swatch change-updated"></i>변경</span>
          <span><i class="swatch change-deleted"></i>삭제(검토)</span>
        </div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js?v=20260723-9"></script>
  </body>
</html>
