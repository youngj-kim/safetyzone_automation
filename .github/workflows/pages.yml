name: Deploy dashboard to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "dashboard/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Inject dashboard runtime config
        env:
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JS_KEY }}
        run: |
          node -e "const fs=require('fs'); const config={kakaoJavascriptKey:process.env.KAKAO_JS_KEY||''}; fs.writeFileSync('dashboard/config.js', 'window.SAFETYZONE_CONFIG = ' + JSON.stringify(config) + ';\n');"

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
