name: Daily safety-zone monitor

on:
  workflow_dispatch:
  schedule:
    # 09:00 KST every day (Korea has no daylight-saving time).
    - cron: "0 0 * * *"

concurrency:
  group: safety-zone-daily-monitor
  cancel-in-progress: false

jobs:
  monitor:
    # mobility_db is localhost:5433, so this must run on the Windows host that owns it.
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      OPEN_API_SERVICE_KEY: ${{ secrets.OPEN_API_SERVICE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SGG_CODES: ${{ vars.SGG_CODES }}
      SGG_CODES_FILE: ${{ vars.SGG_CODES_FILE }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - name: Verify existing mobility database
        run: python -m safety_zone_monitor audit-db
      - name: Run daily monitor
        run: python -m safety_zone_monitor run
      - name: Verify safety-zone data quality
        run: python -m safety_zone_monitor quality-report
