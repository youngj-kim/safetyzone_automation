name: Daily safety-zone monitor

on:
  workflow_dispatch:
    inputs:
      notification_test:
        description: "Send a notification test message only; skip DB monitoring"
        required: false
        default: "false"
      sgg_codes_file:
        description: "Optional SGG code file override, e.g. config/sgg_chunks/nationwide_chunk_01.txt"
        required: false
        default: ""

concurrency:
  group: safety-zone-daily-monitor
  cancel-in-progress: false

jobs:
  monitor:
    # mobility_db is localhost:5433, so this must run on the Windows host that owns it.
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 30
    defaults:
      run:
        # Avoid host PowerShell execution-policy blocking generated setup.ps1 files.
        shell: cmd
    permissions:
      contents: read
    env:
      OPEN_API_SERVICE_KEY: ${{ secrets.OPEN_API_SERVICE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SGG_CODES: ${{ vars.SGG_CODES }}
      SGG_CODES_FILE: ${{ inputs.sgg_codes_file || vars.SGG_CODES_FILE }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify host Python
        run: python --version
      - run: python -m pip install .
      - name: Send notification test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.notification_test == 'true' }}
        run: python -m safety_zone_monitor test-notification
      - name: Verify existing mobility database
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.notification_test == 'true') }}
        run: python -m safety_zone_monitor audit-db
      - name: Run daily monitor
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.notification_test == 'true') }}
        run: python -m safety_zone_monitor run
      - name: Verify safety-zone data quality
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.notification_test == 'true') }}
        run: python -m safety_zone_monitor quality-report
