name: Daily safety-zone monitor

on:
  workflow_dispatch:
  schedule:
    # 09:00 KST every day (Korea has no daylight-saving time).
    - cron: "0 0 * * *"

concurrency:
  group: safety-zone-daily-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      OPEN_API_SERVICE_KEY: ${{ secrets.OPEN_API_SERVICE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SGG_CODES: ${{ vars.SGG_CODES }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - run: safety-zone-monitor run

